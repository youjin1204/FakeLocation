name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Unzip project
        run: |
          unzip FakeLocation.zip -d .
          ls -la
          
      - name: Grant execute permission for gradlew
        run: chmod +x FakeLocation/gradlew
        
      - name: Build APK with Gradle
        working-directory: FakeLocation
        run: ./gradlew assembleDebug
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: fake-location-apk
          path: FakeLocation/app/build/outputs/apk/debug/app-debug.apk
# 旧版本（会报警告）
- uses: actions/checkout@v4
- uses: actions/setup-java@v3

# 升级为兼容新版本的写法
- uses: actions/checkout@v5
- uses: actions/setup-java@v4
